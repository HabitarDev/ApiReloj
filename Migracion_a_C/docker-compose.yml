services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: reloj-api
    container_name: apireloj-api
    restart: unless-stopped
    ports:
      - "${API_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: "Host=host.docker.internal;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"

    extra_hosts:
      - "host.docker.internal:host-gateway"